# Prod: всё в Docker — БД, сервер и веб-клиент (статика через nginx).
# Запуск:  cd run/prod && docker compose up -d --build
# Клиент:  http://localhost:5273   API: http://localhost:3100
# Invite:  ./invite.sh
# Host-порты намеренно смещены (+100), чтобы prod мог работать одновременно с
# dev-стеком (тот держит канонические 3000/5432/5173 — их ждут config.ts и e2e).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    volumes:
      - alpha-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../../src/server
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://alpha:alpha@db:5432/alpha
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3100:3000"

  client:
    build:
      context: ../../src/web_client
      # Адрес сервера вшивается в бандл при сборке и должен совпадать с host-портом
      # сервера выше (браузер ходит на него напрямую, cross-origin + CORS).
      args:
        VITE_API_URL: http://localhost:3100
    depends_on:
      - server
    ports:
      - "5273:80"

volumes:
  alpha-db:
