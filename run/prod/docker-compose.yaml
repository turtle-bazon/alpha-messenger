# Prod: всё в Docker — БД, сервер и веб-клиент (статика через nginx).
# Запуск:  cd run/prod && docker compose up -d --build
# Клиент:  http://localhost:5173   API: http://localhost:3000
# Invite:  ./invite.sh
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    volumes:
      - alpha-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../../src/server
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://alpha:alpha@db:5432/alpha
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  client:
    build:
      context: ../../src/web_client
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  alpha-db:
