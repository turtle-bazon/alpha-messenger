# Prod: всё в Docker — БД, сервер и веб-клиент (статика через nginx).
# Запуск:  cd run/prod && docker compose up -d --build
# Клиент:  http://localhost:5273   API: http://localhost:3100
# Invite:  ./invite.sh
# Host-порты намеренно смещены (+100), чтобы prod мог работать одновременно с
# dev-стеком (тот держит канонические 3000/5432/5173 — их ждут config.ts и e2e).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    volumes:
      - alpha-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: alpha
      MINIO_ROOT_PASSWORD: alpha-secret
    volumes:
      - alpha-blobs:/data
    # Консоль/API наружу (опционально, для отладки): 9100 — S3 API, 9101 — UI.
    ports:
      - "9100:9000"
      - "9101:9001"

  server:
    build:
      context: ../../src/server
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://alpha:alpha@db:5432/alpha
      # Блобы (вложения) — в объектном сторе MinIO. Бакет сервер создаёт сам.
      BLOB_STORE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpha-blobs
      S3_ACCESS_KEY: alpha
      S3_SECRET_KEY: alpha-secret
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3100:3000"

  client:
    build:
      context: ../../src/web_client
      # Адрес сервера вшивается в бандл при сборке и должен совпадать с host-портом
      # сервера выше (браузер ходит на него напрямую, cross-origin + CORS).
      args:
        VITE_API_URL: http://localhost:3100
    depends_on:
      - server
    ports:
      - "5273:80"

volumes:
  alpha-db:
  alpha-blobs:
