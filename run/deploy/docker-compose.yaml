# Deploy: тянет готовые образы из ghcr.io, без локальной сборки.
# Запуск:  cd run/deploy && podman-compose up -d
# Клиент:  http://localhost:5173   API: http://localhost:3000
networks:
  alpha-messenger-net:
    driver: bridge

services:
  db:
    image: docker.io/library/postgres:17-alpine
    networks:
      - alpha-messenger-net
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha
      POSTGRES_DB: alpha
    volumes:
      - /srv/alpha-messenger/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: docker.io/minio/minio
    networks:
      - alpha-messenger-net
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: alpha
      MINIO_ROOT_PASSWORD: alpha-secret
    volumes:
      - /srv/alpha-messenger/blobs:/data
    ports:
      - "9000:9000"

  server:
    image: ghcr.io/gilmullin/alpha_messenger-server:latest
    networks:
      - alpha-messenger-net
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://alpha:alpha@db:5432/alpha
      # Блобы (вложения) — в объектном сторе MinIO. Бакет сервер создаёт сам.
      BLOB_STORE: s3
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: alpha-blobs
      S3_ACCESS_KEY: alpha
      S3_SECRET_KEY: alpha-secret
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "3000:3000"

  client:
    image: ghcr.io/gilmullin/alpha_messenger-client:latest
    networks:
      - alpha-messenger-net
    depends_on:
      - server
    ports:
      - "5173:80"
