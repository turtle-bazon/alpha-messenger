LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
LoadModule headers_module modules/mod_headers.so

<VirtualHost *:80>
    ServerName dOYhOF3V5x.java-lords.ru

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    ProxyTimeout 3600

    # WebSocket
    ProxyPass /ws ws://localhost:3000/ws
    ProxyPassReverse /ws ws://localhost:3000/ws

    # Auth
    ProxyPass /auth/ http://localhost:3000/auth/
    ProxyPassReverse /auth/ http://localhost:3000/auth/

    # User
    ProxyPass /me http://localhost:3000/me
    ProxyPassReverse /me http://localhost:3000/me

    # Chats
    ProxyPass /chats/ http://localhost:3000/chats/
    ProxyPassReverse /chats/ http://localhost:3000/chats/

    # Messages
    ProxyPass /messages/ http://localhost:3000/messages/
    ProxyPassReverse /messages/ http://localhost:3000/messages/

    # Devices
    ProxyPass /devices http://localhost:3000/devices
    ProxyPassReverse /devices http://localhost:3000/devices

    # Push
    ProxyPass /push/ http://localhost:3000/push/
    ProxyPassReverse /push/ http://localhost:3000/push/

    # Health
    ProxyPass /health http://localhost:3000/health
    ProxyPassReverse /health http://localhost:3000/health

    # Everything else — web client (SPA)
    ProxyPass / http://localhost:5173/
    ProxyPassReverse / http://localhost:5173/
</VirtualHost>
