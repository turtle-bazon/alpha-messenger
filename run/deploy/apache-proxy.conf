<VirtualHost *:80>
    ServerName dOYhOF3V5x.java-lords.ru

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    ProxyTimeout 3600

    # WebSocket — поток событий (требует upgrade, своё правило)
    ProxyPass /ws ws://<app-host>:3000/ws
    ProxyPassReverse /ws ws://<app-host>:3000/ws

    # API — все REST-эндпоинты под общим префиксом /api/
    ProxyPass /api/ http://<app-host>:3000/api/
    ProxyPassReverse /api/ http://<app-host>:3000/api/

    # Клиентские файлы для Android-обновлений — на сервере
    ProxyPass /mobile-client/ http://<app-host>:3000/mobile-client/
    ProxyPassReverse /mobile-client/ http://<app-host>:3000/mobile-client/

    # Everything else — web client (SPA)
    ProxyPass / http://<app-host>:5173/
    ProxyPassReverse / http://<app-host>:5173/
</VirtualHost>
