name: Desktop App Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      working-directory: src/desktop_client
      run: npm install

    - name: Build web client
      working-directory: src/web_client
      run: |
        npm install
        npm run build
      env:
        VITE_API_URL: https://doyhof3v5x.java-lords.ru

    - name: Copy web client to desktop_client
      run: cp -r src/web_client/dist src/desktop_client/web_client_dist

    - name: Build Electron app
      working-directory: src/desktop_client
      run: npm run build:${{ matrix.platform }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.platform }}
        path: |
          src/desktop_client/release/*.AppImage
          src/desktop_client/release/*.exe
          src/desktop_client/release/*.dmg
        if-no-files-found: error
        retention-days: 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: release-*
        merge-multiple: true

    - name: List files
      run: ls -la artifacts/

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
