name: Android App Build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build web client
      working-directory: src/web_client
      run: |
        npm install
        npm run build

    - name: Install android_client dependencies
      working-directory: src/android_client
      run: npm install

    - name: Copy web client dist to Capacitor www
      run: cp -r src/web_client/dist src/android_client/www

    - name: Capacitor sync
      working-directory: src/android_client
      run: npx cap sync android

    - name: Build debug APK
      working-directory: src/android_client/android
      run: ./gradlew assembleDebug

    - name: Build release APK
      working-directory: src/android_client/android
      run: ./gradlew assembleRelease

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: alpha-messenger-android-debug
        path: src/android_client/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
        retention-days: 30

    - name: Upload release APK
      uses: actions/upload-artifact@v4
      with:
        name: alpha-messenger-android-release
        path: src/android_client/android/app/build/outputs/apk/release/*.apk
        if-no-files-found: error
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: alpha-messenger-android-*
        merge-multiple: true

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
