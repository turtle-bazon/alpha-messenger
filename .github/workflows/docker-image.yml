name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository }}-client

jobs:

  build-and-push:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Log in to ghcr.io
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push server image
      uses: docker/build-push-action@v5
      with:
        context: src/server
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.SERVER_IMAGE }}:latest
          ${{ env.SERVER_IMAGE }}:${{ github.sha }}

    - name: Build and push client image
      uses: docker/build-push-action@v5
      with:
        context: src/web_client
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ env.CLIENT_IMAGE }}:latest
          ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
