name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server
  CLIENT_IMAGE: ghcr.io/${{ github.repository }}-client

jobs:

  build-and-push:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to ghcr.io
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push server image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: src/server/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        build-args: |
          GIT_HASH=${{ github.sha }}
          BUILD_HASH=${{ github.sha }}
        tags: |
          ${{ env.SERVER_IMAGE }}:latest
          ${{ env.SERVER_IMAGE }}:${{ github.sha }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha,scope=server
        cache-to: type=gha,scope=server,mode=max

    - name: Build and push client image
      uses: docker/build-push-action@v6
      with:
        context: src/web_client
        push: ${{ github.event_name != 'pull_request' }}
        # Пустой VITE_API_URL → относительные URL: клиент шлёт запросы на тот же
        # origin, что и страница, а Apache разводит /api и /ws. Образ не привязан
        # к домену и переносим на любой хост за обратным прокси.
        build-args: |
          VITE_API_URL=
          CLIENT_VERSION=${{ github.sha }}
          BUILD_HASH=${{ github.sha }}
        tags: |
          ${{ env.CLIENT_IMAGE }}:latest
          ${{ env.CLIENT_IMAGE }}:${{ github.sha }}
        labels: |
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
        cache-from: type=gha,scope=client
        cache-to: type=gha,scope=client,mode=max
