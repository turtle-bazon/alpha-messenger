server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # CORS для Android-клиента: WebView загружает bundled www/ (origin https://localhost),
  # а затем fetch'ит index.html с сервера для обновления. Без этого fetch молча падает.
  add_header Access-Control-Allow-Origin "*" always;
  add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  add_header Access-Control-Allow-Headers "*" always;

  if ($request_method = OPTIONS) {
    return 204;
  }

  # index.html — всегда проверять (содержит ссылки на хешированные ассеты)
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # version.json — всегда проверять (для автообновления клиента)
  location = /version.json {
    add_header Cache-Control "no-cache, must-revalidate";
    add_header Access-Control-Allow-Origin "*";
  }

  # Хешированные ассеты (JS, CSS) — кэшировать навсегда (имя меняется при изменении)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA: любой маршрут (например /register) отдаёт index.html — роутинг на клиенте.
  location / {
    try_files $uri /index.html;
  }
}
